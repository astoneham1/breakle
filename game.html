<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakle</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
        if (sessionStorage.getItem('loggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>
    <div id="title">
        <a href="index.html" id="instructions-btn" title="Instructions">❓</a>
        <h1>Breakle</h1>
    </div>
    <div id="character-container">
        <img src="assets/images/question.png" id="character-image" alt="Breakle">
        <div id="result-message" style="display: none;">
            <h2 id="result-status"></h2>
            <div id="result-character">
                <p id="result-character-name"></p>
                <p id="result-guess-count"></p>
            </div>
            <div id="result-buttons">
                <button id="play-again-btn">Play Again</button>
                <button id="view-all-btn-end">View All Characters</button>
            </div>
        </div>
        <div id="clue-indicators">
            <div class="clue-dot" title="Gender"></div>
            <div class="clue-dot" title="Nationality"></div>
            <div class="clue-dot" title="Status"></div>
            <div class="clue-dot" title="First Seen"></div>
            <div class="clue-dot" title="Relation"></div>
            <div class="clue-dot" title="Episodes"></div>
        </div>
        <div id="guess-container">
            <input type="text" id="guess" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <div id="search-results" class="results-list"></div>
        </div>
        <button id="view-all-btn">View All Characters</button>
    </div>

    <div id="all-characters-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="all-characters-heading">All Characters</h2>
            <div id="all-characters-list"></div>
        </div>
    </div>
    <div id="guesses-container">
    </div>
    <script src="js/app.js"></script>
</body>
</html>
