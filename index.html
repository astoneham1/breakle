<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakle - Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="title">
        <h1>Breakle</h1>
    </div>
    <div id="login-container">
        <p>Please enter the code to play</p>
        <input type="password" id="password" autocomplete="off" placeholder="Enter Code">
        <button id="login-btn">Enter</button>
        <p id="error-message" style="color: #ff3333; display: none;">Incorrect code. Try again.</p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
